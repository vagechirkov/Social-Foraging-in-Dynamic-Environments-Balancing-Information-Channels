# Experiment
project_name: "dynamic_evolution_v1"
run_name: "dynamic_ea"
seed: 42
use_wandb: true
use_gpu: false
log_freq: 1
plot_freq: 10

# Evolution Settings
evolution:
  generations: 2000
  replicates: 30
  switch_interval: 250
  elitism_count: 5
  tournament_size: 4
  mutation_prob: 0.6  # mutpb
  crossover_prob: 0.0 # cxpb
  sigma: 0.1
  indpb: 0.2
  selection: "individual-global" # "individual-local"
  
# Environment Configuration
environment:
  mode: "dynamic" # Options: "dynamic", "static"
  static_category: "solitary" # Only used if mode is "static"

environments:
  categories:
    solitary:
      target_speed: 0.7
      cost_priv: 0.005
      cost_belief: 0.05
      spot_radius: 1.0
      dist_noise_scale_priv: 0.05
    
    collective:
      target_speed: 0.7
      cost_priv: 0.05
      cost_belief: 0.005
      spot_radius: 0.25
      dist_noise_scale_priv: 0.05
    
    info_constrained:
      target_speed: 0.3
      cost_priv: 0.08
      cost_belief: 0.08
      spot_radius: 1.0
      dist_noise_scale_priv: 0.05


# Genetic Algorithm / Exploration Settings
ngen: ${evolution.generations} # usage of hydra interpolation if possible, otherwise mapped in code
n_envs: ${evolution.replicates}
top_k: 5


# parameters
x_dim: 2
y_dim: 2
n_agents: 30
n_targets: 1
targets_quality: "HM"
max_steps: 1000 # 5000 simulation steps per generation
target_persistence: 20
target_movement_pattern: "crw"
relocation_interval: 1000

# Default values (can be overridden by environment categories)
target_speed: 0.1
cost_priv: 0.5
cost_belief: 0.1
cost_heading: 0.0
cost_pos: 0.0
dist_noise_scale_priv: 0.5
dist_noise_scale_soc: 0.0 
social_trans_scale: 0.01 
belief_selectivity_threshold: 0.25
consensus_selectivity_threshold: 3.0
cost_consensus: 0.0
bias_magnitude: 0.0
spot_radius: 0.5

# other params
base_noise: 0.1
process_noise_scale: 0.05
process_noise_scale_het_ratio: 0.0
process_noise_scale_het_scale: 1.0
momentum: 0.9
initialization_box_ratio: 1.0
min_dist_between_entities: 0.001
agent_radius: 0.05
continuous_actions: True